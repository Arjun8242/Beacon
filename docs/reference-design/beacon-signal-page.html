<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Beacon — Signal the Beacon</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg-deep:#091624;
    --bg-deep-2:#0d2236;
    --parchment:#f3e8cb;
    --parchment-edge:#e6d3a4;
    --parchment-shadow:#cdb985;
    --ink:#3a2c18;
    --ink-soft:#6e5a3c;
    --gold:#c9a35c;
    --rope:#b88a4f;
    --rope-dark:#8a6435;
    --lh-red:#bf3b2c;
    --lh-white:#f3ece0;
    --beacon-green:#5fae6e;
    --beacon-green-bright:#a8e6b4;
    --beam:#fff3cf;
    --input-bg:#16314a;
    --input-text:#eee6cf;
    --input-placeholder:#8ca0b4;
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0;
    min-height:100%;
  }

  body{
    font-family:'Inter', system-ui, sans-serif;
    background:
      radial-gradient(ellipse at 50% 0%, #15324c 0%, var(--bg-deep) 55%, #060e18 100%);
    color:var(--parchment);
    position:relative;
    overflow-x:hidden;
    min-height:100vh;
    padding:0 0 4rem;
  }

  /* ===== Starfield ===== */
  .stars{
    position:absolute;
    inset:0;
    height:760px;
    pointer-events:none;
    background-image:
      radial-gradient(1.5px 1.5px at 8% 12%, var(--parchment) 50%, transparent 51%),
      radial-gradient(1px 1px at 22% 30%, var(--parchment) 50%, transparent 51%),
      radial-gradient(2px 2px at 35% 8%, var(--parchment) 50%, transparent 51%),
      radial-gradient(1px 1px at 48% 22%, var(--parchment) 50%, transparent 51%),
      radial-gradient(1.5px 1.5px at 65% 10%, var(--parchment) 50%, transparent 51%),
      radial-gradient(1px 1px at 78% 28%, var(--parchment) 50%, transparent 51%),
      radial-gradient(2px 2px at 90% 14%, var(--parchment) 50%, transparent 51%),
      radial-gradient(1px 1px at 14% 45%, var(--parchment) 50%, transparent 51%),
      radial-gradient(1.5px 1.5px at 58% 42%, var(--parchment) 50%, transparent 51%),
      radial-gradient(1px 1px at 83% 50%, var(--parchment) 50%, transparent 51%),
      radial-gradient(1px 1px at 5% 60%, var(--parchment) 50%, transparent 51%),
      radial-gradient(1.5px 1.5px at 40% 60%, var(--parchment) 50%, transparent 51%),
      radial-gradient(1px 1px at 95% 65%, var(--parchment) 50%, transparent 51%);
    background-repeat:no-repeat;
    opacity:.55;
  }
  .star{
    position:absolute;
    width:3px; height:3px;
    border-radius:50%;
    background:var(--parchment);
    box-shadow:0 0 6px 1px rgba(243,232,203,.6);
    animation:twinkle 3.4s ease-in-out infinite;
  }

  @keyframes twinkle{
    0%,100%{ opacity:.25; transform:scale(.8); }
    50%{ opacity:1; transform:scale(1.15); }
  }

  /* ===== Top nav ===== */
  .topnav{
    position:relative;
    z-index:5;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:1.5rem 2.5rem;
    max-width:1280px;
    margin:0 auto;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:.6rem;
    font-family:'Cinzel', serif;
    font-weight:700;
    font-size:1.25rem;
    letter-spacing:.12em;
    color:var(--parchment);
  }
  .brand svg{ width:26px; height:26px; flex:none; }
  .nav-links{
    display:flex;
    align-items:center;
    gap:1.75rem;
    font-size:.85rem;
    letter-spacing:.04em;
  }
  .nav-links a{
    color:var(--parchment);
    text-decoration:none;
    opacity:.8;
    display:flex;
    align-items:center;
    gap:.4rem;
    transition:opacity .2s ease;
  }
  .nav-links a:hover{ opacity:1; }
  .nav-links .signup{
    border:1px solid var(--gold);
    border-radius:6px;
    padding:.45rem 1.1rem;
    opacity:1;
    color:var(--gold);
  }
  .nav-links .signup:hover{
    background:var(--gold);
    color:var(--bg-deep);
  }

  /* ===== Lighthouse scene ===== */
  .scene{
    position:relative;
    z-index:2;
    height:230px;
    display:flex;
    justify-content:center;
    margin-top:.5rem;
  }
  .beam-pivot{
    position:absolute;
    top:64px;
    left:50%;
    width:0;
    height:0;
    transform-origin:50% 100%;
    animation:sweep 16s ease-in-out infinite;
    z-index:1;
  }
  .beam{
    position:absolute;
    bottom:0;
    left:-340px;
    width:680px;
    height:620px;
    background:linear-gradient(to top, rgba(255,243,207,.42), rgba(255,243,207,0) 72%);
    clip-path:polygon(50% 100%, 18% 0%, 82% 0%);
    mix-blend-mode:screen;
    pointer-events:none;
  }
  @keyframes sweep{
    0%,100%{ transform:rotate(-32deg); }
    50%{ transform:rotate(32deg); }
  }

  .lighthouse{
    position:relative;
    z-index:2;
    width:150px;
    height:200px;
  }

  /* ===== Card ===== */
  .stage{
    position:relative;
    z-index:3;
    display:flex;
    justify-content:center;
    padding:0 1.25rem;
  }
  .card{
    width:100%;
    max-width:460px;
    background:var(--parchment);
    background-image:
      repeating-linear-gradient(135deg, rgba(184,138,79,.05) 0 2px, transparent 2px 26px),
      repeating-linear-gradient(45deg, rgba(184,138,79,.05) 0 2px, transparent 2px 26px);
    border-radius:6px;
    box-shadow:
      0 0 0 1px var(--parchment-edge),
      0 1px 0 var(--parchment-shadow) inset,
      0 22px 50px -20px rgba(0,0,0,.55);
    padding:2.25rem 2.25rem 2rem;
    color:var(--ink);
    position:relative;
  }
  .card::before{
    content:"";
    position:absolute;
    inset:10px;
    border:1px dashed rgba(110,90,60,.25);
    border-radius:3px;
    pointer-events:none;
  }

  .card h1{
    font-family:'Cinzel', serif;
    font-size:1.7rem;
    letter-spacing:.16em;
    text-align:center;
    margin:0;
    font-weight:700;
    color:var(--ink);
  }
  .card .subtitle{
    text-align:center;
    margin:.35rem 0 1.75rem;
    color:var(--ink-soft);
    font-size:.95rem;
    letter-spacing:.02em;
  }

  label.field-label{
    display:block;
    font-size:.7rem;
    font-weight:600;
    letter-spacing:.12em;
    color:var(--ink-soft);
    margin:0 0 .4rem;
    text-transform:uppercase;
  }
  .input-wrap{
    position:relative;
    margin-bottom:1.1rem;
  }
  .input-wrap input{
    width:100%;
    background:var(--input-bg);
    border:1px solid #0c1f30;
    border-radius:6px;
    color:var(--input-text);
    font-size:.95rem;
    padding:.75rem 2.5rem .75rem .9rem;
    font-family:inherit;
    transition:box-shadow .2s ease, border-color .2s ease;
  }
  .input-wrap input::placeholder{ color:var(--input-placeholder); }
  .input-wrap input:focus{
    outline:none;
    border-color:var(--beacon-green);
    box-shadow:0 0 0 3px rgba(95,174,110,.25);
  }
  .input-wrap .icon{
    position:absolute;
    right:.8rem;
    top:50%;
    transform:translateY(-50%);
    color:var(--gold);
    width:18px;
    height:18px;
    pointer-events:none;
  }

  .remember{
    display:flex;
    align-items:center;
    gap:.5rem;
    font-size:.85rem;
    color:var(--ink);
    margin-bottom:1.1rem;
    user-select:none;
    cursor:pointer;
  }
  .remember input{
    width:16px; height:16px;
    accent-color:var(--beacon-green);
    cursor:pointer;
  }

  /* ===== Enter Harbor button ===== */
  .enter-btn{
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:.85rem;
    border:1px solid var(--rope-dark);
    border-radius:8px;
    background:linear-gradient(180deg, #6b4a26, #4a3119);
    color:var(--parchment);
    font-family:'Cinzel', serif;
    font-weight:600;
    font-size:1.05rem;
    letter-spacing:.14em;
    padding:.9rem 1rem;
    cursor:pointer;
    margin-top:.4rem;
    position:relative;
    transition:background .35s ease, color .35s ease, transform .15s ease;
  }
  .enter-btn:active{ transform:scale(.99); }

  .enter-btn .wheel-svg{
    display:inline-flex;
    color:var(--gold);
    transition:color .35s ease;
  }
  .enter-btn .mini-lighthouse{
    display:inline-flex;
    color:var(--lh-red);
    transition:color .35s ease, filter .35s ease;
  }

  .enter-btn:hover{
    background:linear-gradient(180deg, #3f6b4a, #294a33);
    color:var(--beacon-green-bright);
    border-color:var(--beacon-green);
    animation:harbor-hum 1.7s ease-in-out infinite;
  }
  .enter-btn:hover .wheel-svg{
    color:var(--beacon-green-bright);
    animation:wheel-spin 3.2s linear infinite;
  }
  .enter-btn:hover .mini-lighthouse{
    color:var(--beacon-green-bright);
    filter:drop-shadow(0 0 6px rgba(168,230,180,.8));
  }

  @keyframes wheel-spin{
    from{ transform:rotate(0deg); }
    to{ transform:rotate(360deg); }
  }
  @keyframes harbor-hum{
    0%,100%{ box-shadow:0 0 10px 1px rgba(95,174,110,.35), inset 0 0 0 1px rgba(168,230,180,.25); }
    50%{ box-shadow:0 0 26px 8px rgba(95,174,110,.55), inset 0 0 0 1px rgba(168,230,180,.55); }
  }

  .links-below{
    text-align:center;
    margin-top:1.5rem;
    font-size:.85rem;
    color:var(--parchment);
    opacity:.85;
    line-height:1.8;
  }
  .links-below a{
    color:var(--gold);
    text-decoration:none;
    border-bottom:1px solid rgba(201,163,92,.4);
  }
  .links-below a:hover{ border-color:var(--gold); }

  /* ===== Decorative footer ===== */
  .harbor-footer{
    position:relative;
    z-index:2;
    max-width:1280px;
    margin:3.5rem auto 0;
    padding:0 2.5rem;
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    gap:2rem;
  }
  .ship-wrap, .compass-wrap{ flex:none; opacity:.85; }
  .ship-wrap svg, .compass-wrap svg{ display:block; }
  .compass-wrap{
    margin:0 auto;
  }
  .compass-needle{
    transform-origin:60px 60px;
    animation:drift 7s ease-in-out infinite;
  }
  @keyframes drift{
    0%,100%{ transform:rotate(-4deg); }
    50%{ transform:rotate(4deg); }
  }

  /* ===== Ropes ===== */
  .rope{
    position:absolute;
    top:0;
    bottom:0;
    width:34px;
    z-index:1;
    background:
      repeating-linear-gradient(135deg, var(--rope) 0 8px, var(--rope-dark) 8px 16px);
    opacity:.35;
    mask-image:linear-gradient(to bottom, transparent, rgba(0,0,0,.9) 12%, rgba(0,0,0,.9) 88%, transparent);
  }
  .rope.left{ left:0; }
  .rope.right{ right:0; }

  @media (max-width:720px){
    .rope{ display:none; }
    .topnav{ padding:1.25rem 1.25rem; }
    .nav-links{ gap:1rem; font-size:.78rem; }
    .nav-links span.label{ display:none; }
    .harbor-footer{ padding:0 1.25rem; }
    .ship-wrap{ display:none; }
    .card{ padding:1.75rem 1.5rem; }
  }

  @media (prefers-reduced-motion: reduce){
    .beam-pivot, .star, .compass-needle{ animation:none !important; }
    .enter-btn:hover{ animation:none !important; }
    .enter-btn:hover .wheel-svg{ animation:none !important; }
  }
</style>
</head>
<body>

  <div class="stars" aria-hidden="true"></div>
  <div class="star" style="top:9%; left:30%; animation-delay:0s;" aria-hidden="true"></div>
  <div class="star" style="top:16%; left:70%; animation-delay:.8s;" aria-hidden="true"></div>
  <div class="star" style="top:6%; left:55%; animation-delay:1.6s;" aria-hidden="true"></div>
  <div class="star" style="top:24%; left:12%; animation-delay:2.4s;" aria-hidden="true"></div>
  <div class="star" style="top:20%; left:88%; animation-delay:1.1s;" aria-hidden="true"></div>
  <div class="star" style="top:30%; left:46%; animation-delay:.4s;" aria-hidden="true"></div>

  <div class="rope left" aria-hidden="true"></div>
  <div class="rope right" aria-hidden="true"></div>

  <header class="topnav">
    <div class="brand">
      <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M16 36h8l-1-6h-6z" fill="currentColor" opacity=".5"/>
        <path d="M14 30h12l-2-18h-8z" fill="currentColor"/>
        <rect x="15" y="18" width="10" height="3" fill="var(--lh-red)"/>
        <rect x="16" y="11" width="8" height="6" fill="currentColor" opacity=".5"/>
        <path d="M14 11l6-7 6 7z" fill="var(--lh-red)"/>
      </svg>
      BEACON
    </div>
    <nav class="nav-links">
      <a href="#"><span aria-hidden="true">~</span><span class="label">Explore public status</span></a>
      <a href="#"><span class="label">Help</span></a>
      <a href="#" class="signup">Sign Up</a>
    </nav>
  </header>

  <!-- Lighthouse with sweeping beam -->
  <div class="scene">
    <div class="beam-pivot" aria-hidden="true">
      <div class="beam"></div>
    </div>
    <svg class="lighthouse" viewBox="0 0 150 200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Lighthouse with a slowly sweeping beam">
      <ellipse cx="75" cy="190" rx="60" ry="10" fill="#0c2233" opacity=".6"/>
      <path d="M50 175 L65 90 L85 90 L100 175 Z" fill="var(--lh-white)"/>
      <rect x="58" y="150" width="34" height="11" fill="var(--lh-red)"/>
      <rect x="61" y="123" width="28" height="11" fill="var(--lh-red)"/>
      <rect x="64" y="96" width="22" height="11" fill="var(--lh-red)"/>
      <rect x="55" y="84" width="40" height="7" fill="#2c3e30"/>
      <rect x="62" y="55" width="26" height="30" fill="#0d2236" stroke="var(--lh-white)" stroke-width="3"/>
      <path d="M62 55 L75 36 L88 55 Z" fill="var(--lh-red)"/>
      <circle cx="75" cy="70" r="7" fill="var(--beam)"/>
    </svg>
  </div>

  <main class="stage">
    <section class="card">
      <h1>Signal the Beacon</h1>
      <p class="subtitle">Secure Harbor Access</p>

      <form onsubmit="return false;">
        <label class="field-label" for="email">Fleet Email / Harbor Ident</label>
        <div class="input-wrap">
          <input type="email" id="email" placeholder="fleetadmin@example.voyage" autocomplete="username" />
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
            <circle cx="12" cy="5" r="2.5"/>
            <path d="M12 7.5v5M5 21c0-4 3-6.5 7-6.5s7 2.5 7 6.5"/>
          </svg>
        </div>

        <label class="field-label" for="key">Voyage Key / Password</label>
        <div class="input-wrap">
          <input type="password" id="key" value="brinewinds27" autocomplete="current-password" />
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
            <circle cx="12" cy="12" r="9"/>
            <path d="M12 7v5l3 2"/>
          </svg>
        </div>

        <label class="remember">
          <input type="checkbox" checked />
          Remember this Harbor
        </label>

        <label class="field-label" for="passkey">Secure Voyage Passkey</label>
        <div class="input-wrap">
          <input type="text" id="passkey" placeholder="Optional" />
        </div>

        <button class="enter-btn" type="submit">
          <span class="wheel-svg" aria-hidden="true">
            <svg width="26" height="26" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="30" cy="30" r="21" stroke="currentColor" stroke-width="3"/>
              <circle cx="30" cy="30" r="5" fill="currentColor"/>
              <g stroke="currentColor" stroke-width="3" stroke-linecap="round">
                <line x1="30" y1="9" x2="30" y2="51"/>
                <line x1="9" y1="30" x2="51" y2="30"/>
                <line x1="15" y1="15" x2="45" y2="45"/>
                <line x1="45" y1="15" x2="15" y2="45"/>
              </g>
              <g fill="currentColor">
                <circle cx="30" cy="7" r="2.6"/>
                <circle cx="30" cy="53" r="2.6"/>
                <circle cx="7" cy="30" r="2.6"/>
                <circle cx="53" cy="30" r="2.6"/>
                <circle cx="13" cy="13" r="2.6"/>
                <circle cx="47" cy="47" r="2.6"/>
                <circle cx="47" cy="13" r="2.6"/>
                <circle cx="13" cy="47" r="2.6"/>
              </g>
            </svg>
          </span>
          <span>Enter Harbor</span>
          <span class="mini-lighthouse" aria-hidden="true">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
              <path d="M9 22h6l-1-4H10z" opacity=".5"/>
              <path d="M8 18h8l-1.4-12h-5.2z"/>
              <path d="M9.6 6h4.8L12 2z"/>
            </svg>
          </span>
        </button>
      </form>

      <div class="links-below">
        <p>Don't have a harbor? <a href="#">Create a New Fleet</a></p>
        <p>Forgot Voyage Key? <a href="#">Signal Support</a></p>
      </div>
    </section>
  </main>

  <footer class="harbor-footer" aria-hidden="true">
    <div class="ship-wrap">
      <svg width="160" height="100" viewBox="0 0 160 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 70h140l-14 22H24z" fill="#caa86a"/>
        <line x1="80" y1="70" x2="80" y2="14" stroke="#caa86a" stroke-width="3"/>
        <path d="M81 18 L122 64 H81 Z" fill="#e6d3a4" opacity=".85"/>
        <path d="M79 26 L50 64 H79 Z" fill="#f3e8cb" opacity=".7"/>
        <g stroke="var(--lh-red)" stroke-width="4" stroke-linecap="round">
          <line x1="96" y1="30" x2="112" y2="46"/>
          <line x1="112" y1="30" x2="96" y2="46"/>
        </g>
      </svg>
    </div>

    <div class="compass-wrap">
      <svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="60" cy="60" r="50" stroke="var(--gold)" stroke-width="1.5" opacity=".6"/>
        <circle cx="60" cy="60" r="36" stroke="var(--gold)" stroke-width="1" opacity=".35"/>
        <g class="compass-needle">
          <path d="M60 24 L68 60 L60 96 L52 60 Z" fill="var(--gold)" opacity=".8"/>
          <path d="M60 24 L68 60 L60 60 Z" fill="var(--lh-red)"/>
        </g>
        <text x="60" y="14" text-anchor="middle" font-family="Cinzel, serif" font-size="11" fill="var(--parchment)">N</text>
        <text x="60" y="112" text-anchor="middle" font-family="Cinzel, serif" font-size="11" fill="var(--parchment)">S</text>
        <text x="8" y="64" text-anchor="middle" font-family="Cinzel, serif" font-size="11" fill="var(--parchment)">W</text>
        <text x="112" y="64" text-anchor="middle" font-family="Cinzel, serif" font-size="11" fill="var(--parchment)">E</text>
      </svg>
    </div>

    <div class="ship-wrap" style="transform:scaleX(-1);">
      <svg width="160" height="100" viewBox="0 0 160 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 70h140l-14 22H24z" fill="#caa86a"/>
        <line x1="80" y1="70" x2="80" y2="14" stroke="#caa86a" stroke-width="3"/>
        <path d="M81 18 L122 64 H81 Z" fill="#e6d3a4" opacity=".85"/>
        <path d="M79 26 L50 64 H79 Z" fill="#f3e8cb" opacity=".7"/>
      </svg>
    </div>
  </footer>

</body>
</html>
